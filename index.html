<!DOCTYPE html>
<html>
<head>
<title>Visitor Tracker</title>
</head>
<body>

<h2>Visitor Info</h2>
<p id="info"></p>

<script>
fetch("https://api.ipify.org?format=json")
.then(res => res.json())
.then(data => {

let ip = data.ip;
let device = navigator.userAgent;

document.getElementById("info").innerHTML =
"IP Address: " + ip + "<br>" +
"Device / Browser: " + device;

});
</script>

</body>
</html>
